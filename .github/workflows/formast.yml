name: Recursive Prettier Format (Production Grade)

on:
  push:
    branches: [main]
  workflow_dispatch: # Permite rodar manualmente via interface do GitHub

# Cancela execuções em andamento se um novo push chegar na mesma branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prettier:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essencial para o bot conseguir fazer o push

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Garante histórico para comparação e push

      - name: Get Target Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          # Filtro rigoroso conforme solicitado
          files: |
            **/*.ps1
            **/*.py
            **/*.bat
            **/*.xml
            **/*.json
          files_ignore: |
            **/*.min.*
          # Usa separador NUL (\0) para lidar com arquivos que contenham espaços no nome
          separator: "\x00"
          # Gera um arquivo temporário com a lista (evita erro de limite de caracteres)
          write_output_files: true

      - name: Setup Node
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Otimiza futuras execuções salvando o cache do npm

      - name: Run Prettier
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          # 1. Instalação rápida (beneficiada pelo cache do setup-node)
          npm install prettier@3.2.5 --no-save

          # 2. Execução otimizada
          # O xargs lê a lista NUL diretamente do arquivo de saída da action
          xargs -0 npx prettier --write --ignore-unknown < "${{ steps.changed-files.outputs.all_changed_files_output_file }}"

      - name: Commit & Push Changes
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-format (ps1, py, bat, xml, json) [skip ci]'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'

          # Removido --force para evitar sobrescrever pushes humanos simultâneos
          # O git-auto-commit-action já gerencia o push de forma segura.
          push_options: ''

          # Garante que arquivos novos (untracked) também sejam formatados e incluídos
          add_options: '--all'
