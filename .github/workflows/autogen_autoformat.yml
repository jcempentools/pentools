name: Geração de Unattend + Autoformatação (Resiliente, Determinístico e Observável)

# ==============================================================================
# DESCRIÇÃO:
# Workflow CI/CD que:
#   - Gera arquivos XML Unattend a partir de um modelo
#   - Aplica formatação consistente (Prettier) em arquivos suportados
#   - Sincroniza automaticamente alterações no repositório
#
# FLUXO DE EXECUÇÃO:
#   1. Detecta mudanças relevantes nos arquivos monitorados
#   2. Interrompe execução se não houver alterações (early-exit)
#   3. Formata arquivos alterados via Prettier (execução incremental)
#   4. Executa script gerador de XMLs Unattend
#   5. Detecta alterações resultantes (formatação + geração)
#   6. Cria commit apenas se houver mudanças reais
#   7. Realiza push com retry e rebase para manter histórico linear
#
# GARANTIAS:
#   - Idempotência: evita commits vazios e execuções redundantes
#   - Resiliência: retry com tratamento de conflito e limpeza de estado
#   - Observabilidade: logs estruturados visíveis apenas no console
#   - Segurança: sem geração de arquivos de log ou execução insegura
# ==============================================================================

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/autogen_autoformat.yml'
      - 'boot/autonome/windows/autounattend.model.xml'
      - '**/*.{ps1,py,bat,json,sh}'
      - 'boot/autonome/windows/make.autounattend.sh'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  process-matrix:
    timeout-minutes: 15

    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip ci]')

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Contexto da execução
        run: |
          set -Eeuo pipefail
          exec 1>&1
          exec 2>&2

          echo "::group::Contexto Detalhado"
          echo "[INFO] Evento: ${{ github.event_name }}"
          echo "[INFO] Ator: ${{ github.actor }}"
          echo "[INFO] SHA: ${{ github.sha }}"
          echo "[INFO] Timestamp: $(date -Iseconds)"
          echo "::endgroup::"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar arquivos alterados
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: |
            .github/workflows/autogen_autoformat.yml
            boot/autonome/windows/autounattend.model.xml
            **/*.{ps1,py,bat,json,sh}
            boot/autonome/windows/make.autounattend.sh
          files_ignore: |
            boot/autonome/windows/autounattend/**
            **/*.min.*

      - name: Validar execução
        run: |
          set -Eeuo pipefail
          exec 1>&1
          exec 2>&2

          echo "[DEBUG] any_changed=${{ steps.changed.outputs.any_changed }}"

          if [ "${{ steps.changed.outputs.any_changed }}" != "true" ]; then
            echo "[INFO] Nenhuma mudança relevante detectada. Finalizando."
            exit 0
          fi

          echo "::group::Arquivos Detectados"
          echo "${{ steps.changed.outputs.all_changed_files }}"
          echo "::endgroup::"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Executar Prettier
        env:
          FILE_LIST: ${{ steps.changed.outputs.all_changed_files_output_file }}
        run: |
          set -Eeuo pipefail
          exec 1>&1
          exec 2>&2

          echo "::group::Prettier"

          if [ ! -s "$FILE_LIST" ]; then
            echo "[WARN] Lista de arquivos vazia."
            exit 0
          fi

          npm install --no-save --no-package-lock --loglevel=error \
            prettier@3.2.5 \
            prettier-plugin-powershell \
            @prettier/plugin-python

          xargs -0 -r npx prettier --write \
            --plugin=prettier-plugin-powershell \
            --plugin=@prettier/plugin-python \
            --ignore-unknown < "$FILE_LIST" \
            || echo "[WARN] Erros não críticos no Prettier."

          COUNT=$(tr -cd '\0' < "$FILE_LIST" | wc -c)
          echo "[METRIC] Arquivos processados: $COUNT"

          echo "::endgroup::"

      - name: Executar gerador
        run: |
          set -Eeuo pipefail
          exec 1>&1
          exec 2>&2

          echo "::group::Gerador"

          SCRIPT="boot/autonome/windows/make.autounattend.sh"

          if [ -f "$SCRIPT" ]; then
            chmod +x "$SCRIPT" || true
            (cd boot/autonome/windows && ./make.autounattend.sh)
          else
            echo "[FATAL] Script não encontrado."
            exit 1
          fi

          echo "::endgroup::"

      - name: Sincronizar repositório
        run: |
          set -Eeuo pipefail
          exec 1>&1
          exec 2>&2

          echo "::group::Git Sync"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "[INFO] Sem alterações para commit."
            exit 0
          fi

          echo "::group::Arquivos no commit"
          git diff --cached --name-only
          echo "::endgroup::"

          FILES_COUNT=$(git diff --cached --name-only | wc -l)
          git commit -m "auto: update matrix & format ($FILES_COUNT files) [skip ci]"

          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "[INFO] Tentativa de Push $i/$MAX_RETRIES"

            git fetch origin master

            if git rebase origin/master; then
              if git push origin master; then
                echo "[SUCCESS] Sincronizado."
                exit 0
              fi
            else
              echo "[WARN] Rebase falhou, limpando estado..."
              git rebase --abort || true
              git reset --hard HEAD
            fi

            sleep 5
          done

          echo "[FATAL] Falha ao sincronizar após $MAX_RETRIES tentativas."
          exit 1
