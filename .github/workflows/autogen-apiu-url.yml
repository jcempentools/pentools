# ======================================================================================
# DIRETRIZES DE NEGĂCIO E SEGURANĂA - AUTOMAĂĂO DE DOWNLOADS ISO
# ======================================================================================
# 1. OBJETIVO: Manter URLs e Hashes de distribuiĂ§Ă”es Linux atualizados via GitHub Actions.
# 2. PERIODICIDADE: ExecuĂ§ĂŁo automĂĄtica dominical (00:01 UTC) ou disparo manual via UI.
# 3. IDEMPOTĂNCIA E BLINDAGEM:
#    - PersistĂȘncia: O arquivo 'API_JSON/urls.json' nunca deve ser deletado ou zerado.
#    - Fallback: Se um mirror falhar, os dados preexistente no JSON DEVEM ser mantidos.
#    - Atomicidade: GravaĂ§Ă”es via JQ utilizam arquivos temporĂĄrios para evitar corrupĂ§ĂŁo.
# 4. RESILIĂNCIA DE REDE:
#    - Retries: MĂ­nimo de 3 tentativas com Backoff Exponencial (espera crescente).
#    - Timeout: Limite estrito de 10s por requisiĂ§ĂŁo e 60s para o ciclo total de scraping.
# 5. ESTRUTURA DE DADOS:
#    - PadrĂŁo: {
#       "sistema": {
#         "url":"URL_FILE",
#          "hash": "URL_HASH_OU_STRING"
#          [,variaĂ§ĂŁo1: { "url": "URL_ISO", "hash": "URL_HASH_OU_STRING"}...]  (Opcionalmente)
#        }
#      }.
#    - Integridade: URLs devem obrigatoriamente iniciar com o protocolo HTTPS?.
# 6. GESTĂO DE REPOSITĂRIO:
#    - Commits: Apenas em caso de alteraĂ§ĂŁo real de conteĂșdo (PrevenĂ§ĂŁo de No-Op Commits).
#    - Rastreabilidade: Logs detalhados em todas as etapas para auditoria de falhas.
# ======================================================================================

name: Update API URLs
on:
  schedule:
    - cron: '1 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Instalando DependĂȘncias
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Atualizar URL e Hash
        run: |
          # --- CONFIGURAĂĂES DE AMBIENTE ---
          DIR="API_JSON"
          FILE="$DIR/urls.json"
          LOG_PREFIX="[DEBUG-AUTOMATION]"
          MAX_RETRIES=3
          TOTAL_TIMEOUT=60
          START_TIME=$(date +%s)

          # 1. FUNĂĂO DE INFRAESTRUTURA
          ensure_infrastructure() {
            if [ ! -d "$DIR" ]; then
              echo "$LOG_PREFIX DiretĂłrio $DIR nĂŁo existe. Criando recursivamente..."
              mkdir -p "$DIR" || { echo "ERRO FATAL: ImpossĂ­vel criar diretĂłrio."; exit 1; }
            fi

            if [ ! -f "$FILE" ] || [ ! -s "$FILE" ]; then
              echo "$LOG_PREFIX Arquivo JSON nĂŁo encontrado ou vazio. Inicializando objeto."
              echo '{}' > "$FILE"
            fi
          }

          # 2. FUNĂĂO DE VERIFICAĂĂO DE TIMEOUT GLOBAL
          check_global_timeout() {
            local label=$1
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ $ELAPSED -ge $TOTAL_TIMEOUT ]; then
              echo "$LOG_PREFIX [$label] TIMEOUT GLOBAL: ${TOTAL_TIMEOUT}s excedido." >&2
              return 1
            fi
            return 0
          }

          # 3. FUNĂĂO DE FETCH COM RETRY (SAĂDA LIMPA)
          smart_fetch() {
            local label=$1
            local cmd=$2
            local attempt=1
            local wait_time=2

            while [ $attempt -le $MAX_RETRIES ]; do
              check_global_timeout "$label" || return 1
              
              echo "$LOG_PREFIX [$label] Tentativa $attempt de $MAX_RETRIES..." >&2
              result=$(timeout 20s bash -c "$cmd" 2>/dev/null)

              if [ -n "$result" ] && [[ "$result" =~ ^https?:// ]]; then
                echo "$result"
                return 0
              fi

              echo "$LOG_PREFIX [$label] Falha. Aguardando ${wait_time}s..." >&2
              sleep $wait_time
              attempt=$((attempt + 1))
              wait_time=$((wait_time * 2))
            done

            echo "$LOG_PREFIX [$label] ERRO: Falha definitiva." >&2
            return 1
          }

          # 4. FUNĂĂO DE VALIDAĂĂO HTTPS
          # 4. FUNĂĂO DE NORMALIZAĂĂO DE URL (FORĂA HTTPS, TRATA FTP)
          normalize_url() {
            local url=$1
            local system=$2
            
            if [[ "$url" =~ ^ftp:// ]]; then
              echo "$LOG_PREFIX [$system] AVISO: URL FTP detectada. Convertendo para HTTPS."
              url=$(echo "$url" | sed 's|^ftp://|https://|')
            elif [[ "$url" =~ ^http:// ]]; then
              echo "$LOG_PREFIX [$system] AVISO: URL HTTP detectada. ForĂ§ando HTTPS."
              url=$(echo "$url" | sed 's|^http://|https://|')
            elif [[ ! "$url" =~ ^https:// ]]; then
              echo "$LOG_PREFIX [$system] AVISO: URL sem protocolo. Adicionando HTTPS."
              url="https://$url"
            fi
            
            echo "$url"
          }

          # 5. FUNĂĂO DE BACKUP ATĂMICO
          atomic_backup() {
            cp "$FILE" "${FILE}.backup"
          }

          # 6. FUNĂĂO DE RESTAURAĂĂO
          atomic_restore() {
            mv "${FILE}.backup" "$FILE"
            rm -f "${FILE}.tmp"
          }

          # 7. FUNĂĂO DE PERSISTĂNCIA JQ
          persist_json() {
            local system=$1
            local url=$2
            local hash=$3
            
            atomic_backup
            
            if jq --arg sys "$system" --arg url "$url" --arg hash "$hash" \
              '.[$sys] = {"url": $url, "hash": $hash}' "$FILE" > "${FILE}.tmp"; then
                mv "${FILE}.tmp" "$FILE"
                echo "$LOG_PREFIX [$system] SUCESSO: Dados persistidos."
                rm -f "${FILE}.backup"
                return 0
            else
                echo "$LOG_PREFIX [$system] ERRO: Falha no JQ. Mantendo dados anteriores."
                atomic_restore
                return 1
            fi
          }

          # 8. FUNĂĂO DE ATUALIZAĂĂO COMPLETA (NĂO INTERROMPE FLUXO)
          update_json_structure() {
            local system=$1
            local new_url=$2
            local new_hash=$3

            if [ -z "$new_url" ]; then
              echo "$LOG_PREFIX [$system] URL vazia. Mantendo dados existentes."
              return 0
            fi
            
            new_url=$(normalize_url "$new_url" "$system")
            
            echo "$LOG_PREFIX [$system] Validando dados..."
            persist_json "$system" "$new_url" "$new_hash"
            
            return 0
          }

          # 9. FUNĂĂES ESPECĂFICAS POR SOFTWARE
          fetch_linuxmint() {
            local system_key="linuxmint"
            echo "$LOG_PREFIX Extraindo dados: Linux Mint..."
            
            local base_url="https://mirrors.edge.kernel.org/linuxmint/stable/"
            local version=$(curl -sL --max-time 20 "$base_url" | grep -oP '[0-9.]+(?=/)' | sort -V | tail -n 1)
            
            if [ -z "$version" ]; then
              echo "$LOG_PREFIX [$system_key] Falha na detecĂ§ĂŁo da versĂŁo. Mantendo dados anteriores."
              return 0
            fi
            
            local url="${base_url}${version}/linuxmint-${version}-cinnamon-64bit.iso"
            url=$(normalize_url "$url" "$system_key")
            local hash=$(echo "$url" | sed 's|linuxmint-.*.iso|sha256sum.txt|')
            
            update_json_structure "$system_key" "$url" "$hash"
            return 0
          }

          fetch_batocera() {
            local system_key="batocera"
            echo "$LOG_PREFIX Extraindo dados: Batocera..."
            
            local base_url="https://o2switch.fr"
            local file=$(curl -sL --max-time 20 "$base_url" | grep -oP 'href=\"\Kbatocera-x86_64-[^\"]+\.img\.gz' | head -1)
            
            if [ -z "$file" ]; then
              echo "$LOG_PREFIX [$system_key] Falha na detecĂ§ĂŁo do arquivo. Mantendo dados anteriores."
              return 0
            fi
            
            local url="${base_url}${file}"
            url=$(normalize_url "$url" "$system_key")
            local hash="${url}.sha256"
            
            update_json_structure "$system_key" "$url" "$hash"
            return 0
          }

          fetch_libreelec_dual() {
            local system_key="libreelec"
            echo "$LOG_PREFIX Extraindo dados dual: LibreELEC..."
            
            local base_url="https://libreelec.tv"
            local version=$(curl -sL --max-time 20 "$base_url" | grep -oP '>\K[0-9.]+(?=/)' | sort -V | tail -1)
            
            if [ -z "$version" ]; then
              echo "$LOG_PREFIX [$system_key] Falha na detecĂ§ĂŁo da versĂŁo. Mantendo dados anteriores."
              return 0
            fi
            
            local url_main="${base_url}/LibreELEC-Generic.x86_64-${version}.img.gz"
            local url_legacy="${base_url}/LibreELEC-Generic-legacy.x86_64-${version}.img.gz"
            
            url_main=$(normalize_url "$url_main" "$system_key")
            url_legacy=$(normalize_url "$url_legacy" "$system_key")
            
            local hash_main="${url_main}.sha256"
            local hash_legacy="${url_legacy}.sha256"
            
            atomic_backup
            
            if jq --arg sys "$system_key" \
                  --arg url_main "$url_main" \
                  --arg hash_main "$hash_main" \
                  --arg url_legacy "$url_legacy" \
                  --arg hash_legacy "$hash_legacy" \
              '.[$sys] = {
                "url": $url_main,
                "hash": $hash_main,
                "legacy": {
                  "url": $url_legacy,
                  "hash": $hash_legacy
                }
              }' "$FILE" > "${FILE}.tmp"; then
                mv "${FILE}.tmp" "$FILE"
                echo "$LOG_PREFIX [$system_key] SUCESSO: Dados dual persistidos."
                rm -f "${FILE}.backup"
            else
                echo "$LOG_PREFIX [$system_key] ERRO: Falha no JQ. Mantendo dados anteriores."
                atomic_restore
            fi
            
            return 0
          }

          # 10. FUNĂĂO LEGADA (MANTIDA PARA COMPATIBILIDADE)
          process_distro() {
            local name=$1
            local cmd=$2
            local hash_transform=$3
            local system_key=$(echo "$name" | tr '[:upper:]' '[:lower:]')
            
            echo "$LOG_PREFIX Extraindo dados: $name..."
            
            local url=""
            url=$(smart_fetch "${name}_URL" "$cmd") || {
              echo "$LOG_PREFIX [$system_key] Falha na obtenĂ§ĂŁo da URL. Mantendo dados anteriores."
              return 0
            }
            
            if [ -n "$url" ]; then
              local hash=$(eval "$hash_transform")
              update_json_structure "$system_key" "$url" "$hash"
            fi
            
            return 0
          }

          # 9.1 FUNĂĂO PARA DISTROS COM DUAS VERSĂES (LIBREELEC)
          process_distro_dual() {
            local name=$1
            local cmd_main=$2
            local cmd_legacy=$3
            local hash_transform=$4
            local system_key=$(echo "$name" | tr '[:upper:]' '[:lower:]')
            
            echo "$LOG_PREFIX Extraindo dados dual: $name..."
            
            local url_main=""
            local url_legacy=""
            local hash_main=""
            local hash_legacy=""
            
            url_main=$(smart_fetch "${name}_MAIN_URL" "$cmd_main") || {
              echo "$LOG_PREFIX [$system_key] Falha na obtenĂ§ĂŁo da URL principal. Mantendo dados anteriores."
            }
            
            url_legacy=$(smart_fetch "${name}_LEGACY_URL" "$cmd_legacy") || {
              echo "$LOG_PREFIX [$system_key] Falha na obtenĂ§ĂŁo da URL legacy. Mantendo dados anteriores."
            }
            
            atomic_backup
            
            if [ -n "$url_main" ]; then
              url_main=$(normalize_url "$url_main" "$system_key")
              hash_main=$(eval "$hash_transform" "$url_main")
            fi
            
            if [ -n "$url_legacy" ]; then
              url_legacy=$(normalize_url "$url_legacy" "$system_key")
              hash_legacy=$(eval "$hash_transform" "$url_legacy")
            fi
            
            if jq --arg sys "$system_key" \
                  --arg url_main "$url_main" \
                  --arg hash_main "$hash_main" \
                  --arg url_legacy "$url_legacy" \
                  --arg hash_legacy "$hash_legacy" \
              '.[$sys] = {
                "url": $url_main,
                "hash": $hash_main,
                "legacy": {
                  "url": $url_legacy,
                  "hash": $hash_legacy
                }
              }' "$FILE" > "${FILE}.tmp"; then
                mv "${FILE}.tmp" "$FILE"
                echo "$LOG_PREFIX [$system_key] SUCESSO: Dados dual persistidos."
                rm -f "${FILE}.backup"
            else
                echo "$LOG_PREFIX [$system_key] ERRO: Falha no JQ. Mantendo dados anteriores."
                atomic_restore
            fi
            
            return 0
          }

          # 10. FUNĂĂES DE HASH TRANSFORM
          mint_hash() { echo "$1" | sed 's|linuxmint-.*.iso|sha256sum.txt|'; }
          suffix_hash() { echo "${1}.sha256"; }

          # --- EXECUĂĂO PRINCIPAL (CONTINUA MESMO COM FALHAS PARCIAIS) ---
          echo "$LOG_PREFIX Iniciando processo de auditoria de mirrors..."
          ensure_infrastructure

          fetch_linuxmint
          fetch_batocera
          fetch_libreelec_dual

          echo "$LOG_PREFIX Processo finalizado. Falhas individuais nĂŁo interromperam a execuĂ§ĂŁo."
          echo "$LOG_PREFIX Estado final do JSON:"
          cat "$FILE"

      - name: Git Deploy (Atomic Commit)
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Workflow Bot"

          # Busca alteraĂ§Ă”es do remoto para evitar conflitos
          git pull --rebase origin ${GITHUB_REF#refs/heads/} || true

          git add API_JSON/urls.json

          # Verifica se hĂĄ alteraĂ§Ă”es locais apĂłs o pull
          if git diff --cached --quiet; then
            echo "LOG: Nenhuma alteraĂ§ĂŁo detectada no JSON. Encerrando sem commit."
          else
            git commit -m "Automated Update: URLs and Hashes [$(date +'%Y-%m-%d %H:%M')]"
            git push origin ${GITHUB_REF#refs/heads/}
          fi
